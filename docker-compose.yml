services:
  kitahrm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kitahrm
    restart: unless-stopped
    # Bind only to localhost - expose via Nginx reverse proxy
    ports:
      - "127.0.0.1:3000:3000"
    # Secrets and URLs come from .env (copy from .env.example and fill in)
    env_file:
      - .env
    volumes:
      # SQLite database - persisted across restarts and updates
      - kitahrm_data:/app/data
      # Uploaded documents - persisted across restarts and updates
      - kitahrm_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  kitahrm_data:
    driver: local
  kitahrm_uploads:
    driver: local
